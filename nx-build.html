<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NX Build</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #dc2626;
            --accent-hover: #b91c1c;
            --border: #334155;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 1000px; margin: 40px auto; padding: 0 20px; color: var(--text-main); background: var(--bg-dark); line-height: 1.5; }
        .card { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 1px solid var(--border); }
        h1 { margin-top: 0; color: var(--text-main); font-size: 26px; border-bottom: 3px solid var(--accent); padding-bottom: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; }
        p { color: var(--text-sub); font-size: 15px; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; padding: 14px; margin: 15px 0; border: 1px solid var(--border); border-radius: 6px; font-family: monospace; font-size: 13px; box-sizing: border-box; resize: vertical; background: var(--bg-dark); color: #38bdf8; outline: none; }
        
        .control-actions { display: flex; gap: 15px; margin-bottom: 20px; }
        button { background: var(--accent); color: white; border: none; padding: 14px 28px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        button:hover { background: var(--accent-hover); }
        
        .manifest-container { margin-top: 25px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-dark); display: none; overflow: hidden; }
        .manifest-header { background: #1e293b; padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; font-weight: bold; font-size: 14px; text-transform: uppercase; color: var(--text-sub); }
        .manifest-list { max-height: 400px; overflow-y: auto; padding: 10px 0; }
        .manifest-item { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        .col-check { width: 40px; display: flex; align-items: center; }
        .col-info { flex-grow: 1; padding-right: 20px; }
        .col-type { font-size: 11px; font-weight: 800; text-transform: uppercase; background: #334155; padding: 3px 8px; border-radius: 4px; color: #e2e8f0; white-space: nowrap; }
        .type-index { background: #15803d; }
        .type-sitemap { background: #9333ea; }
        .type-article { background: #1d4ed8; }
        
        .art-title-text { font-weight: 600; color: #f1f5f9; display: block; margin-bottom: 2px; }
        .art-meta-text { font-size: 12px; color: var(--text-sub); }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
        
        #status { margin-top: 20px; padding: 14px; border-radius: 6px; display: none; font-weight: 600; text-align: center; font-size: 14px; }
        .success { background: rgba(22, 163, 74, 0.1); color: #4ade80; border: 1px solid rgba(22, 163, 74, 0.2); }
        .info { background: rgba(37, 99, 235, 0.1); color: #60a5fa; border: 1px solid rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body>

    <div class="card">
        <h1>📰 System Deployment Package Engine</h1>
        <p>Step 1: Paste your clipboard JSON array data below and tap "Load Records". Run via a local web server (Live Server) so it can securely access templates.</p>
        
        <textarea id="jsonInput" placeholder="Paste your clipboard data array string here..."></textarea>
        
        <div class="control-actions">
            <button onclick="loadJsonData()">🔍 Load Records from JSON</button>
            <button id="downloadBtn" style="display:none;" onclick="compileSelectedZip()">📦 Download Package (.ZIP)</button>
        </div>

        <div id="status"></div>

        <div class="manifest-container" id="manifestBlock">
            <div class="manifest-header">
                <div class="col-check"><input type="checkbox" id="selectAllBox" checked onchange="toggleSelectAll(this)"></div>
                <div class="col-info">File Name / Route Pattern</div>
                <div>Target Compilation Output Type</div>
            </div>
            <div class="manifest-list" id="manifestGrid"></div>
        </div>
    </div>

    <script>
        let loadedArticles = [];

        function loadJsonData() {
            const rawJson = document.getElementById('jsonInput').value.trim();
            const statusDiv = document.getElementById('status');
            const manifestBlock = document.getElementById('manifestBlock');
            const manifestGrid = document.getElementById('manifestGrid');
            const downloadBtn = document.getElementById('downloadBtn');

            if (!rawJson) {
                alert("Please paste your updated JSON array code inside the editor system first.");
                return;
            }

            try {
                loadedArticles = JSON.parse(rawJson).reverse();
                if(!Array.isArray(loadedArticles)) throw new Error("Data must be an array.");

                statusDiv.style.display = "block";
                statusDiv.className = "info";
                statusDiv.innerHTML = `Discovered ${loadedArticles.length} entries inside records structure.`;
                
                manifestGrid.innerHTML = '';
                
                // 1. Add Index Row
                manifestGrid.appendChild(createRowElement({ isType: "index", title: "Main News Homepage Dashboard", route: "index.html" }));

                // 2. Add Sitemap Row
                manifestGrid.appendChild(createRowElement({ isType: "sitemap", title: "XML Search Index Document (All JSON Routes Included)", route: "sitemap.xml" }));

                // 3. Add Article Rows targeting the Articles subfolder
                loadedArticles.forEach((art, idx) => {
                    const uniqueRoute = art.slug ? `Articles/${art.slug}.html` : `Articles/article-id-${art.id || idx}.html`;
                    manifestGrid.appendChild(createRowElement({ isType: "article", index: idx, title: art.title || "Untitled Article Node", route: uniqueRoute }));
                });

                document.getElementById('selectAllBox').checked = true;
                manifestBlock.style.display = "block";
                downloadBtn.style.display = "inline-block";

            } catch (err) {
                alert("JSON syntax evaluation breakdown error.");
                console.error(err);
            }
        }

        function createRowElement(item) {
            const row = document.createElement('div');
            row.className = 'manifest-item';
            
            if (item.isType === "index") {
                row.innerHTML = `
                    <div class="col-check"><input type="checkbox" class="file-select-box" data-type="index" checked></div>
                    <div class="col-info"><span class="art-title-text">${item.title}</span><span class="art-meta-text">Root directory (${item.route})</span></div>
                    <div><span class="col-type type-index">INDEX PORTAL</span></div>
                `;
            } else if (item.isType === "sitemap") {
                row.innerHTML = `
                    <div class="col-check"><input type="checkbox" class="file-select-box" data-type="sitemap" checked></div>
                    <div class="col-info"><span class="art-title-text">${item.title}</span><span class="art-meta-text">Static index standard (${item.route})</span></div>
                    <div><span class="col-type type-sitemap">SITEMAP XML</span></div>
                `;
            } else {
                row.innerHTML = `
                    <div class="col-check"><input type="checkbox" class="file-select-box" data-type="article" data-index="${item.index}" checked></div>
                    <div class="col-info"><span class="art-title-text">${item.title}</span><span class="art-meta-text">Output file path: ${item.route}</span></div>
                    <div><span class="col-type type-article">ARTICLE HTML</span></div>
                `;
            }
            return row;
        }

        function toggleSelectAll(masterBox) {
            document.querySelectorAll('.file-select-box').forEach(cb => cb.checked = masterBox.checked);
        }

        async function compileSelectedZip() {
            const statusDiv = document.getElementById('status');
            const checkboxes = document.querySelectorAll('.file-select-box');
            let selectedArticleIndexes = [];
            let includeIndex = false;
            let includeSitemap = false;

            checkboxes.forEach(cb => {
                if (cb.checked) {
                    const type = cb.getAttribute('data-type');
                    if (type === 'index') includeIndex = true;
                    else if (type === 'sitemap') includeSitemap = true;
                    else selectedArticleIndexes.push(parseInt(cb.getAttribute('data-index')));
                }
            });

            statusDiv.className = "info";
            statusDiv.innerHTML = "Fetching secure external template frames... Please wait.";

            try {
                const homeRes = await fetch('nx-home.html');
                const articleRes = await fetch('nx-article.html');
                
                if (!homeRes.ok || !articleRes.ok) {
                    throw new Error("Could not load template files. Ensure nx-home.html and nx-article.html are in the same folder.");
                }

                let homeRawTemplate = await homeRes.text();
                let articleRawTemplate = await articleRes.text();

                const zip = new JSZip();
                let storyCards = '';
                let trendingItems = '';
                let trendingClones = '';
                let trendingCounter = 1;

                // ==========================================
                // EDIT YOUR DOMAIN HERE
                // ==========================================
                const baseDomain = "sample.com"; 
                // ==========================================

                const cleanDomainPrefix = baseDomain.replace(/^(https?:\/\/)?/, "").replace(/\/$/, "");

                // Initialize Sitemap URL array
                let sitemapUrls = [];
                
                if (includeIndex) {
                    sitemapUrls.push(`  <url>\n    <loc>https://${cleanDomainPrefix}/</loc>\n    <priority>1.0</priority>\n  </url>`);
                }

                // Reads ONLY the listed categories present in your uploaded JSON data
                let uniqueCategories = new Set();
                loadedArticles.forEach(art => {
                    if (art.category && art.category.trim() !== '') {
                        uniqueCategories.add(art.category.trim());
                    }
                });

                let categoryButtons = Array.from(uniqueCategories).map(cat => 
                    `<div class="nav-link" data-category="${cat}">${cat}</div>`
                ).join('\n                ');

                // Process article layout structures
                loadedArticles.forEach((art, idx) => {
                    const isSelected = selectedArticleIndexes.includes(idx);
                    const baseFileName = art.slug ? `${art.slug}.html` : `article-id-${art.id || idx}.html`;
                    
                    const currentZipPath = `Articles/${baseFileName}`;
                    const currentWebHref = `Articles/${baseFileName}`;
                    
                    const cleanTitle = (art.title || '').toLowerCase().replace(/"/g, '&quot;');
                    const cleanSubtitle = (art.subtitle || '').toLowerCase().replace(/"/g, '&quot;');
                    const keywordsString = (art.keywords || []).join(', ').toLowerCase().replace(/"/g, '&quot;');
                    const fallbackImg = 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=600&q=80';
                    const displayImg = art.imgLink ? art.imgLink : fallbackImg;

                    // Keeps ALL JSON records inside the sitemap
                    sitemapUrls.push(`  <url>\n    <loc>https://${cleanDomainPrefix}/${currentWebHref}</loc>\n    <priority>0.8</priority>\n  </url>`);

                    if (isSelected) {
                        let pMarkup = art.paragraphs && art.paragraphs.length > 0 
                            ? art.paragraphs.map(p => `<p>${p}</p>`).join('\n            ')
                            : `<p>${art.summary || ''}</p>`;
                            
                        let tagsMarkup = art.keywords ? art.keywords.map(kw => `<span class="tag-node">${kw}</span>`).join(' ') : '';

                        let pageRender = articleRawTemplate
                            .replace(/{{ARTICLE_TITLE}}/g, art.title || 'Untitled')
                            .replace(/{{ARTICLE_CATEGORY}}/g, art.category || 'Breaking')
                            .replace(/{{ARTICLE_SUBTITLE}}/g, art.subtitle || '')
                            .replace(/{{ARTICLE_AUTHOR}}/g, art.author || 'NationExpress Desk')
                            .replace(/{{ARTICLE_DATE}}/g, art.data || 'Live Timeline')
                            .replace(/{{ARTICLE_IMAGE}}/g, displayImg)
                            .replace(/{{ARTICLE_BODY}}/g, pMarkup)
                            .replace(/{{ARTICLE_TAGS}}/g, tagsMarkup);

                        zip.file(currentZipPath, pageRender);
                    }

                    // Build Main Newsfeed lines targeting the nested Articles folder
                    storyCards += `
            <a class="ie-card" href="${currentWebHref}" data-category="${art.category || 'Breaking'}" data-title="${cleanTitle}" data-subtitle="${cleanSubtitle}" data-keywords="${keywordsString}">
                <div class="ie-card-img-box"><img class="ie-card-img" src="${displayImg}" alt="Graphic" loading="lazy"></div>
                <div class="ie-card-content">
                    <span class="ie-tag">${art.category || 'Breaking'}</span>
                    <h3 class="ie-title">${art.title || 'Untitled'}</h3>
                    <p class="ie-summary">${art.subtitle || art.summary || ''}</p>
                    <div class="ie-meta">By <span class="ie-author">${art.author || 'Staff'}</span> &bull; ${art.data || 'Live'}</div>
                </div>
            </a>\n`;

                    if (art.trending === true) {
                        trendingItems += `
                <a class="trending-item" href="${currentWebHref}">
                    <span class="ie-tag">Trending #${trendingCounter}</span>
                    <h4 class="trending-title">${art.title || 'Untitled'}</h4>
                </a>\n`;
                        trendingClones += `
                <a class="trending-item mobile-only-cloned" href="${currentWebHref}">
                    <span class="ie-tag">Trending #Clone_${trendingCounter}</span>
                    <h4 class="trending-title">${art.title || 'Untitled'}</h4>
                </a>\n`;
                        trendingCounter++;
                    }
                });

                // Write static configuration sitemap containing all slugs
                if (includeSitemap) {
                    const finalSitemapXml = `<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n${sitemapUrls.join('\n')}\n</urlset>`;
                    zip.file("sitemap.xml", finalSitemapXml);
                }

                if (includeIndex) {
                    let homeRender = homeRawTemplate
                        .replace(/{{CATEGORY_BUTTONS}}/g, categoryButtons)
                        .replace(/{{STORY_CARDS}}/g, storyCards)
                        .replace(/{{TRENDING_ITEMS}}/g, trendingItems)
                        .replace(/{{TRENDING_CLONES}}/g, trendingClones);
                        
                    zip.file('index.html', homeRender);
                }

                // Compile zip file archive structure
                const zipContent = await zip.generateAsync({type: "blob"});
                const fileURL = URL.createObjectURL(zipContent);
                const downloadAnchor = document.createElement('a');
                downloadAnchor.href = fileURL;
                downloadAnchor.download = "production-cms-package.zip";
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                document.body.removeChild(downloadAnchor);

                statusDiv.className = "success";
                statusDiv.innerHTML = "🎉 Production build compiled inside the 'Articles/' path context successfully!";

            } catch(e) {
                alert("Process error: Ensure you use Live Server to execute file calls.");
                console.error(e);
            }
        }
    </script>
</body>
</html>
